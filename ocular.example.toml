# Ocular configuration
# Docs: https://github.com/beyondlex/ocular

# ─── Display ────────────────────────────────────────────────────────────────

# Theme: "default", "tokyo-night-storm", "dracula", "solarized-light", "solarized-dark"
theme = "tokyo-night-storm"

# Event line format (supports hot-reload)
# Fields: index, time, component, command, latency, src, dest
# %{N}field = fixed width (positive=right-align, negative=left-align)
event_format = "%{5}index %time %{-8}component %latency %command"

# Highlight events slower than this threshold (ms) in red
# latency_threshold_ms = 5.0

# Use fuzzy matching for `/` filter (false = exact substring match)
# fuzzy_filter = true

# Show leader menu popup when pressing Space (false = still works, just no popup)
# leader_menu = false

# Ask for confirmation before quitting with `q`
# quit_confirm = false

# ─── Global Exclude (by protocol) ───────────────────────────────────────────
# Hide noisy events. Per-proxy [proxy.exclude] merges with these.

[exclude.redis]
patterns = ["PING", "INFO"]

[exclude.mysql]
patterns = ["SELECT 1"]

[exclude.postgres]
patterns = ["SET ", "DEALLOCATE"]

[exclude.rabbitmq]
patterns = ["Heartbeat"]

# ─── Proxies ────────────────────────────────────────────────────────────────
# Uncomment the services you need. Your app connects to `listen`, Ocular
# forwards to `remote` transparently.

[[proxy]]
name = "redis"
protocol = "redis"
listen = "127.0.0.1:16379"
remote = "127.0.0.1:6379"

[[proxy]]
name = "mysql"
protocol = "mysql"
listen = "127.0.0.1:13306"
remote = "127.0.0.1:3306"

