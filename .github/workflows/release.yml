name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: ocular-linux-amd64
            features: ""
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            name: ocular-macos-arm64
            features: ""
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            name: ocular-macos-amd64
            features: ""
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build with cross (Linux musl)
        if: matrix.use_cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          # Use a custom Cross.toml to install libpcap in the cross container
          cat > Cross.toml <<'EOF'
          [target.x86_64-unknown-linux-musl]
          pre-build = [
            "apt-get update && apt-get install --assume-yes flex bison wget musl-tools linux-headers-generic",
            "wget -q https://www.tcpdump.org/release/libpcap-1.10.5.tar.xz -O /tmp/libpcap.tar.xz",
            "tar xf /tmp/libpcap.tar.xz -C /tmp",
            "cd /tmp/libpcap-1.10.5 && CC=musl-gcc CFLAGS='-I/usr/include' ./configure --prefix=/usr/local/musl --disable-shared --with-pcap=linux --without-libnl --disable-dbus && make -j$(nproc) && make install"
          ]
          [target.x86_64-unknown-linux-musl.env]
          passthrough = ["PCAP_LIBDIR"]
          EOF
          PCAP_LIBDIR=/usr/local/musl/lib cross build --release --target ${{ matrix.target }} ${{ matrix.features }}
      - name: Build (macOS)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}
      - run: cp target/${{ matrix.target }}/release/ocular ${{ matrix.name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: ocular-*

  publish-crates:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - run: cargo publish -p ocular-protocol || true
      - run: sleep 30
      - run: cargo publish -p ocular-proxy || true
      - run: sleep 30
      - run: cargo publish -p ocular-capture || true
      - run: sleep 30
      - run: cargo publish -p ocular-tui || true
      - run: sleep 30
      - run: cargo publish -p ocular-cli || true
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Calculate SHA256
        id: sha
        run: |
          SHA_ARM64=$(curl -fSL https://github.com/beyondlex/ocular/releases/download/${{ github.ref_name }}/ocular-macos-arm64 | shasum -a 256 | cut -d' ' -f1)
          SHA_AMD64=$(curl -fSL https://github.com/beyondlex/ocular/releases/download/${{ github.ref_name }}/ocular-macos-amd64 | shasum -a 256 | cut -d' ' -f1)
          SHA_LINUX=$(curl -fSL https://github.com/beyondlex/ocular/releases/download/${{ github.ref_name }}/ocular-linux-amd64 | shasum -a 256 | cut -d' ' -f1)
          echo "arm64=$SHA_ARM64" >> $GITHUB_OUTPUT
          echo "amd64=$SHA_AMD64" >> $GITHUB_OUTPUT
          echo "linux=$SHA_LINUX" >> $GITHUB_OUTPUT
      - name: Update Homebrew Formula
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: beyondlex/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "sha256_macos_arm64": "${{ steps.sha.outputs.arm64 }}",
              "sha256_macos_amd64": "${{ steps.sha.outputs.amd64 }}",
              "sha256_linux_amd64": "${{ steps.sha.outputs.linux }}"
            }
