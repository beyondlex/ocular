name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: ocular-linux-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: ocular-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: ocular-macos-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - run: cp target/${{ matrix.target }}/release/ocular ${{ matrix.name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: ocular-*

  publish-crates:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p ocular-protocol --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30
      - run: cargo publish -p ocular-proxy --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30
      - run: cargo publish -p ocular-tui --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30
      - run: cargo publish -p ocular-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Calculate SHA256
        id: sha
        run: |
          SHA_ARM64=$(curl -fSL https://github.com/beyondlex/ocular/releases/download/${{ github.ref_name }}/ocular-macos-arm64 | shasum -a 256 | cut -d' ' -f1)
          SHA_AMD64=$(curl -fSL https://github.com/beyondlex/ocular/releases/download/${{ github.ref_name }}/ocular-macos-amd64 | shasum -a 256 | cut -d' ' -f1)
          SHA_LINUX=$(curl -fSL https://github.com/beyondlex/ocular/releases/download/${{ github.ref_name }}/ocular-linux-amd64 | shasum -a 256 | cut -d' ' -f1)
          echo "arm64=$SHA_ARM64" >> $GITHUB_OUTPUT
          echo "amd64=$SHA_AMD64" >> $GITHUB_OUTPUT
          echo "linux=$SHA_LINUX" >> $GITHUB_OUTPUT
      - name: Update Homebrew Formula
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: beyondlex/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "sha256_macos_arm64": "${{ steps.sha.outputs.arm64 }}",
              "sha256_macos_amd64": "${{ steps.sha.outputs.amd64 }}",
              "sha256_linux_amd64": "${{ steps.sha.outputs.linux }}"
            }
