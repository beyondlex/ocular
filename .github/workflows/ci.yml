name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets --workspace --exclude ocular-capture --no-default-features
      - run: cargo test --workspace --exclude ocular-capture --no-default-features
      - run: cargo clippy --workspace --exclude ocular-capture --no-default-features -- -D warnings
