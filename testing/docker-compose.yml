services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
      MYSQL_ROOT_HOST: '%'
    command: --mysql-native-password=ON
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis-client:
    image: redis:7-alpine
    depends_on:
      - redis
    volumes:
      - ./redis_crud.sh:/crud.sh:ro
    entrypoint: ["sh", "/crud.sh"]
    environment:
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=16379
      - INTERVAL=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["client"]

  mysql-client:
    image: mysql:8
    depends_on:
      - mysql
    volumes:
      - ./mysql_crud.sh:/crud.sh:ro
    entrypoint: ["sh", "/crud.sh"]
    environment:
      - MYSQL_HOST=host.docker.internal
      - MYSQL_PORT=13306
      - MYSQL_USER=root
      - MYSQL_PASS=root
      - MYSQL_DB=testdb
      - INTERVAL=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["client"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  rabbitmq-client:
    image: python:3-alpine
    depends_on:
      - rabbitmq
    volumes:
      - ./rabbitmq_crud.sh:/crud.sh:ro
    entrypoint: ["sh", "/crud.sh"]
    environment:
      - RABBITMQ_HOST=host.docker.internal
      - RABBITMQ_PORT=15672
      - INTERVAL=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["client"]

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
      POSTGRES_HOST_AUTH_METHOD: trust

  postgres-client:
    image: postgres:16-alpine
    depends_on:
      - postgres
    volumes:
      - ./postgres_crud.sh:/crud.sh:ro
    entrypoint: ["sh", "/crud.sh"]
    environment:
      - PGHOST=host.docker.internal
      - PGPORT=15432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=testdb
      - INTERVAL=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["client"]

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: testdb

  mongodb-client:
    image: mongo:7
    depends_on:
      - mongodb
    volumes:
      - ./mongodb_crud.sh:/crud.sh:ro
    entrypoint: ["sh", "/crud.sh"]
    environment:
      - MONGO_HOST=host.docker.internal
      - MONGO_PORT=17017
      - INTERVAL=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["client"]

  elasticsearch:
    image: elasticsearch:8.13.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"

  elasticsearch-client:
    image: curlimages/curl:latest
    depends_on:
      - elasticsearch
    volumes:
      - ./elasticsearch_crud.sh:/crud.sh:ro
    entrypoint: ["sh", "/crud.sh"]
    environment:
      - ES_HOST=host.docker.internal
      - ES_PORT=19200
      - INTERVAL=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["client"]

  nginx-https:
    image: nginx:alpine
    ports:
      - "8443:443"
    volumes:
      - ./nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    command: >
      sh -c "apk add --no-cache openssl &&
             mkdir -p /etc/nginx/certs &&
             openssl req -x509 -nodes -days 365 -newkey rsa:2048
               -keyout /etc/nginx/certs/key.pem -out /etc/nginx/certs/cert.pem
               -subj '/CN=localhost' 2>/dev/null &&
             nginx -g 'daemon off;'"

  https-client:
    image: curlimages/curl:latest
    depends_on:
      - nginx-https
    volumes:
      - ./https_crud.sh:/crud.sh:ro
    entrypoint: ["sh", "/crud.sh"]
    environment:
      - TARGET_HOST=host.docker.internal
      - TARGET_PORT=18443
      - INTERVAL=2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["client"]
